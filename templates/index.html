<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detector</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --error: #f87171;
            --ok: #34d399;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            background:
                radial-gradient(circle at top left, #1d4ed8 0%, transparent 40%),
                radial-gradient(circle at bottom right, #0ea5e9 0%, transparent 35%),
                var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        main {
            width: min(640px, 100%);
            background: color-mix(in srgb, var(--panel) 92%, transparent);
            border: 1px solid #334155;
            padding: 2rem;
        }

        h1 {
            margin: 0 0 0.5rem;
            font-size: 2rem;
            letter-spacing: 0.02em;
        }

        p.subtitle {
            margin: 0 0 1.5rem;
            color: var(--muted);
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--muted);
        }

        textarea {
            width: 100%;
            min-height: 140px;
            resize: vertical;
            padding: 0.85rem 1rem;
            border: 1px solid #475569;
            background: #0b1220;
            color: var(--text);
            font: inherit;
            margin-bottom: 1rem;
        }

        textarea:focus {
            outline: 2px solid var(--accent);
            border-color: transparent;
        }

        button {
            appearance: none;
            border: 0;
            background: var(--accent);
            color: #0f172a;
            font: inherit;
            font-weight: 700;
            padding: 0.75rem 1.25rem;
            cursor: pointer;
        }

        button:hover {
            filter: brightness(1.05);
        }

        .error {
            margin-top: 1.25rem;
            padding: 0.85rem 1rem;
            border: 1px solid var(--error);
            color: var(--error);
            background: rgba(248, 113, 113, 0.08);
        }

        .results {
            margin-top: 1.5rem;
            padding-top: 1.25rem;
            border-top: 1px solid #334155;
        }

        .results h2 {
            margin: 0 0 1rem;
            font-size: 1.25rem;
        }

        .results ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .results li {
            display: flex;
            justify-content: space-between;
            padding: 0.45rem 0;
            border-bottom: 1px solid #334155;
            color: var(--muted);
        }

        .results li span {
            color: var(--text);
        }

        .dominant {
            margin-top: 1rem;
            color: var(--ok);
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <main>
        <h1>Emotion Detector</h1>
        <p class="subtitle">Analyze text emotions with Watson NLP.</p>

        <form action="/emotionDetector" method="POST">
            <label for="text_to_analyse">Text to analyze</label>
            <textarea
                id="text_to_analyse"
                name="text_to_analyse"
                placeholder="Type or paste your text here..."
                required
            >{{ text or "" }}</textarea>
            <button type="submit">Analyze Emotion</button>
        </form>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        {% if dominant_emotion %}
        <section class="results">
            <h2>Results</h2>
            <ul>
                <li>Anger <span>{{ anger }}</span></li>
                <li>Disgust <span>{{ disgust }}</span></li>
                <li>Fear <span>{{ fear }}</span></li>
                <li>Joy <span>{{ joy }}</span></li>
                <li>Sadness <span>{{ sadness }}</span></li>
            </ul>
            <p class="dominant">Dominant emotion: <strong>{{ dominant_emotion }}</strong></p>
        </section>
        {% endif %}
    </main>
</body>
</html>
